coverage:
  status:
    patch: off
    project:
      default: false
      library:
        target: auto
        paths:
          - '!**/tests/**'
          - '!**/testing/**'
        threshold: 0.2%
      tests:
        target: auto
        paths:
          - '**/tests/**'
          - '**/testing/**'
        threshold: 0.2%
# Note: an invalid codecov.yml is silently ignored (Codecov falls back to
# defaults, e.g. notifying before all reports are in). Check changes with:
#   curl --data-binary @codecov.yml https://codecov.io/validate
component_management:
  default_rules:
    # Components are informational buckets in the Codecov UI; do not add
    # extra per-component status checks to PRs.
    statuses: []
  individual_components:
    - component_id: library
      name: Library
      paths:
        - IPython/**
        - '!IPython/testing/**'
        - '!**/tests/**'
    - component_id: test-suite
      name: Test suite
      paths:
        - tests/**
        - IPython/testing/**
    - component_id: core
      name: Core
      paths:
        - IPython/core/**
        - '!IPython/core/magics/**'
    - component_id: magics
      name: Magics
      paths:
        - IPython/core/magics/**
    - component_id: terminal
      name: Terminal
      paths:
        - IPython/terminal/**
    - component_id: lib
      name: Lib
      paths:
        - IPython/lib/**
    - component_id: utils
      name: Utils
      paths:
        - IPython/utils/**
    - component_id: extensions
      name: Extensions
      paths:
        - IPython/extensions/**
    - component_id: external
      name: External
      paths:
        - IPython/external/**
flag_management:
  default_rules:
    statuses:
      - type: patch
        target: auto
        threshold: 0.2%
      - type: project
        target: auto
        threshold: 0.2%
  individual_flags:
    - name: unit-tests
      paths:
        - '**/tests/**'
        - '**/testing/**'
    - name: library
      paths:
        - '!**/tests/**'
        - '!**/testing/**'
codecov:
  require_ci_to_pass: false
  branch: main
  notify:
    # Number of coverage reports uploaded by the "test" job matrix in
    # .github/workflows/test.yml (one per matrix combination that runs
    # with --cov). Update this if the matrix changes.
    after_n_builds: 11
    wait_for_ci: true

ignore:
  - IPython/kernel/*
  - IPython/consoleapp.py
  - IPython/lib/kernel.py
  - IPython/utils/jsonutil.py
  - IPython/utils/log.py
  - IPython/utils/signatures.py
